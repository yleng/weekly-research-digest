name: Email Weekly Digest

on:
  push:
    paths:
      - 'digests/digest-*.md'

permissions:
  contents: read

jobs:
  email-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new digest file
        id: find
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'digests/digest-*.md' | grep -v curated | head -1)
          if [ -z "$FILE" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "file=$FILE" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
            DATE=$(echo "$FILE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
            echo "date=$DATE" >> $GITHUB_OUTPUT
          fi

      - name: Send digest email via Resend
        if: steps.find.outputs.found == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FILE: ${{ steps.find.outputs.file }}
          DIGEST_DATE: ${{ steps.find.outputs.date }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, sys

          digest_file = os.environ["DIGEST_FILE"]
          digest_date = os.environ["DIGEST_DATE"]
          api_key = os.environ["RESEND_API_KEY"]

          with open(digest_file) as f:
              content = f.read()

          link = f"https://github.com/yleng/weekly-research-digest/blob/main/{digest_file}"
          text = f"Your weekly research digest for {digest_date} is ready.\n\nFull digest (best viewed on GitHub): {link}\n\n---\n\n{content}"

          payload = json.dumps({
              "from": "Weekly Digest <onboarding@resend.dev>",
              "to": ["yleng@mit.edu"],
              "subject": f"[Weekly Research Digest] {digest_date}",
              "text": text
          }).encode()

          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              }
          )
          try:
              resp = urllib.request.urlopen(req)
              print(f"Email sent: {resp.read().decode()}")
          except Exception as e:
              print(f"Email failed: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF
