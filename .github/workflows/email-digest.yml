name: Email Weekly Digest

on:
  push:
    paths:
      - 'digests/digest-*.md'

permissions:
  contents: read

jobs:
  email-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new digest file
        id: find
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'digests/digest-*.md' | grep -v curated | head -1)
          if [ -z "$FILE" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "file=$FILE" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
            DATE=$(echo "$FILE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
            echo "date=$DATE" >> $GITHUB_OUTPUT
          fi

      - name: Send digest email via Resend
        if: steps.find.outputs.found == 'true'
        run: |
          # Read digest and escape for JSON
          CONTENT=$(cat "${{ steps.find.outputs.file }}")
          DATE="${{ steps.find.outputs.date }}"
          LINK="https://github.com/yleng/weekly-research-digest/blob/main/${{ steps.find.outputs.file }}"

          # Build plain text email
          TEXT=$(printf "Your weekly research digest for %s is ready.\n\nFull digest (best viewed on GitHub): %s\n\n---\n\n%s" "$DATE" "$LINK" "$CONTENT")

          # Send via Resend API
          # Use python to handle JSON escaping properly
          python3 -c "
          import json, urllib.request, sys

          text = sys.stdin.read()
          payload = json.dumps({
              'from': 'Weekly Digest <onboarding@resend.dev>',
              'to': ['yleng@mit.edu'],
              'subject': f'[Weekly Research Digest] ${{ steps.find.outputs.date }}',
              'text': text
          }).encode()

          req = urllib.request.Request(
              'https://api.resend.com/emails',
              data=payload,
              headers={
                  'Authorization': 'Bearer ${{ secrets.RESEND_API_KEY }}',
                  'Content-Type': 'application/json'
              }
          )
          try:
              resp = urllib.request.urlopen(req)
              print(f'Email sent: {resp.read().decode()}')
          except Exception as e:
              print(f'Email failed: {e}', file=sys.stderr)
              sys.exit(1)
          " <<< "$TEXT"
