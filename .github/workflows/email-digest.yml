name: Email Weekly Digest

on:
  push:
    paths:
      - 'digests/digest-*.md'

permissions:
  contents: read

jobs:
  email-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new digest file
        id: find
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'digests/digest-*.md' | grep -v curated | head -1)
          if [ -z "$FILE" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "file=$FILE" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
            DATE=$(echo "$FILE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
            echo "date=$DATE" >> $GITHUB_OUTPUT
          fi

      - name: Send digest email via Resend
        if: steps.find.outputs.found == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FILE: ${{ steps.find.outputs.file }}
          DIGEST_DATE: ${{ steps.find.outputs.date }}
        run: |
          # Debug: check key length (never print actual key)
          echo "API key length: ${#RESEND_API_KEY}"
          echo "API key prefix: ${RESEND_API_KEY:0:3}"
          echo "Digest file: $DIGEST_FILE"
          echo "Digest date: $DIGEST_DATE"

          # Send via curl (simpler, fewer escaping issues)
          CONTENT=$(cat "$DIGEST_FILE" | head -c 8000)
          LINK="https://github.com/yleng/weekly-research-digest/blob/main/$DIGEST_FILE"

          # Use jq to safely build JSON
          PAYLOAD=$(jq -n \
            --arg from "Weekly Digest <onboarding@resend.dev>" \
            --arg to "yleng@mit.edu" \
            --arg subject "[Weekly Research Digest] $DIGEST_DATE" \
            --arg text "Your weekly research digest for $DIGEST_DATE is ready.\n\nView on GitHub: $LINK\n\n---\n\n$CONTENT" \
            '{from: $from, to: [$to], subject: $subject, text: $text}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Email sending failed"
            exit 1
          fi
          echo "Email sent successfully"
